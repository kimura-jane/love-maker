<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋愛病院カルテメーカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Klee+One:wght@400;600&family=Yuji+Syuku&family=Zen+Kurenaido&family=Yomogi&family=Kaisei+Opti:wght@400;700&family=Reggae+One&family=Hachi+Maru+Pop&family=Zen+Antique+Soft&family=Shippori+Mincho:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, #e8f4fd 0%, #f0e6f6 50%, #fce4ec 100%);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    color: #5b8fc9;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  h1 .heart { color: #e891b9; }

  .subtitle {
    text-align: center;
    color: #999;
    font-size: 0.85rem;
    margin-bottom: 30px;
  }

  /* ===== FORM ===== */
  .form-section {
    background: white;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(91,143,201,0.12);
  }

  .form-section h2 {
    color: #5b8fc9;
    font-size: 1.2rem;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px dashed #d0e4f5;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-weight: 700;
    color: #5b8fc9;
    font-size: 0.9rem;
    margin-bottom: 6px;
  }

  .form-group input[type="text"],
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #d0e4f5;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Zen Maru Gothic', sans-serif;
    transition: border-color 0.3s;
    background: #fafcff;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #89b8e0;
    background: #fff;
  }

  .form-group textarea {
    height: 60px;
    resize: vertical;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Icon upload */
  .icon-upload {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 18px;
  }

  .icon-preview {
    width: 100px;
    height: 100px;
    border-radius: 16px;
    background: #e8f4fd;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 3px dashed #b0d4f1;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.3s;
  }

  .icon-preview:hover { border-color: #5b8fc9; }

  .icon-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .icon-preview .placeholder {
    color: #a0c4e8;
    font-size: 0.75rem;
    text-align: center;
    line-height: 1.4;
  }

  .icon-upload-right {
    flex: 1;
  }

  .icon-upload-right input[type="file"] {
    font-size: 0.85rem;
  }

  /* Font selector */
  .font-selector {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .font-option {
    padding: 10px;
    border: 2px solid #e0ecf5;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: white;
  }

  .font-option:hover { border-color: #89b8e0; background: #f0f7ff; }
  .font-option.active { border-color: #5b8fc9; background: #e8f4fd; box-shadow: 0 0 0 2px rgba(91,143,201,0.3); }

  .font-option .font-name {
    font-size: 0.7rem;
    color: #999;
    margin-top: 4px;
  }

  /* Buttons */
  .btn-generate {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #7db9e8 0%, #b8a9d9 50%, #e891b9 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 1.2rem;
    font-weight: 900;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    letter-spacing: 3px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(91,143,201,0.3);
  }

  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(91,143,201,0.4); }
  .btn-generate:active { transform: translateY(0); }

  .btn-download {
    display: none;
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: linear-gradient(135deg, #e891b9, #f4a9c8);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.2s;
    box-shadow: 0 4px 15px rgba(232,145,185,0.3);
  }

  .btn-download:hover { transform: translateY(-2px); }

  /* ===== KARTE CANVAS ===== */
  .karte-wrapper {
    display: none;
    margin-top: 30px;
    text-align: center;
  }

  .karte-wrapper h2 {
    color: #5b8fc9;
    margin-bottom: 16px;
  }

  #karteCanvas {
    max-width: 100%;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(91,143,201,0.2);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .font-selector { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 1.5rem; }
    .form-section { padding: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>LOVE CLINIC 恋愛<span class="heart">♡</span>病院</h1>
  <p class="subtitle">カルテメーカー ─ あなたの恋愛カルテを作ろう！</p>

  <!-- ===== FORM ===== -->
  <div class="form-section">
    <h2>📷 アイコン設定</h2>
    <div class="icon-upload">
      <div class="icon-preview" id="iconPreview" onclick="document.getElementById('iconInput').click()">
        <div class="placeholder">クリックして<br>画像を選択</div>
      </div>
      <div class="icon-upload-right">
        <input type="file" id="iconInput" accept="image/*">
        <p style="font-size:0.75rem;color:#999;margin-top:6px;">正方形推奨。顔写真やイラストなど</p>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>📝 プロフィール</h2>
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="fname" placeholder="例：桑田 能征">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>年齢</label>
        <input type="text" id="fage" placeholder="例：40歳">
      </div>
      <div class="form-group">
        <label>出身地</label>
        <input type="text" id="forigin" placeholder="例：大阪府">
      </div>
    </div>
    <div class="form-group">
      <label>職業</label>
      <input type="text" id="fjob" placeholder="例：実業家">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ラブタイプ</label>
        <input type="text" id="flovetype" placeholder="例：憧れの先輩">
      </div>
      <div class="form-group">
        <label>ニックネーム</label>
        <input type="text" id="fnickname" placeholder="例：りゅーびー">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>好きなアーティスト</label>
        <input type="text" id="fartist" placeholder="例：Mrs. GREEN APPLE">
      </div>
      <div class="form-group">
        <label>子供の頃の夢</label>
        <input type="text" id="fdream" placeholder="例：サッカー選手">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>趣味・特技</label>
        <input type="text" id="fhobby" placeholder="例：サッカー, スノボ, バイオリン">
      </div>
      <div class="form-group">
        <label>恋愛における自分の強み</label>
        <input type="text" id="fstrength" placeholder="例：牽引力 ぐいぐい引っぱる！">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>過去の恋愛失敗談</label>
        <textarea id="ffail" placeholder="例：仕事を追うことに夢中になっておざなりにしてしまった"></textarea>
      </div>
      <div class="form-group">
        <label>恋愛偏差値</label>
        <input type="text" id="fdeviation" placeholder="例：40〜45">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>番組内で自分のここをみて！</label>
        <textarea id="fwatch" placeholder="例：輪で楽しめるとこ。"></textarea>
      </div>
      <div class="form-group">
        <label>OA直前の気持ちは？</label>
        <textarea id="ffeeling" placeholder="例：誰が病人なんだ！！"></textarea>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>🖊 手書き風フォント選択</h2>
    <p style="font-size:0.8rem;color:#999;margin-bottom:12px;">回答部分に使うフォントを選んでください</p>
    <div class="font-selector" id="fontSelector">
      <div class="font-option active" data-font="'Yomogi', cursive" onclick="selectFont(this)">
        <span style="font-family:'Yomogi',cursive;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Yomogi</div>
      </div>
      <div class="font-option" data-font="'Klee One', cursive" onclick="selectFont(this)">
        <span style="font-family:'Klee One',cursive;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Klee One</div>
      </div>
      <div class="font-option" data-font="'Zen Kurenaido', sans-serif" onclick="selectFont(this)">
        <span style="font-family:'Zen Kurenaido',sans-serif;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Zen Kurenaido</div>
      </div>
      <div class="font-option" data-font="'Yuji Syuku', serif" onclick="selectFont(this)">
        <span style="font-family:'Yuji Syuku',serif;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Yuji Syuku</div>
      </div>
      <div class="font-option" data-font="'Hachi Maru Pop', cursive" onclick="selectFont(this)">
        <span style="font-family:'Hachi Maru Pop',cursive;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Hachi Maru Pop</div>
      </div>
      <div class="font-option" data-font="'Zen Antique Soft', serif" onclick="selectFont(this)">
        <span style="font-family:'Zen Antique Soft',serif;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Zen Antique Soft</div>
      </div>
      <div class="font-option" data-font="'Kaisei Opti', serif" onclick="selectFont(this)">
        <span style="font-family:'Kaisei Opti',serif;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Kaisei Opti</div>
      </div>
      <div class="font-option" data-font="'Reggae One', cursive" onclick="selectFont(this)">
        <span style="font-family:'Reggae One',cursive;font-size:1.1rem;">あいうえお</span>
        <div class="font-name">Reggae One</div>
      </div>
    </div>
  </div>

  <button class="btn-generate" onclick="generateKarte()">♡ カルテを生成する ♡</button>

  <!-- ===== OUTPUT ===== -->
  <div class="karte-wrapper" id="karteWrapper">
    <h2>あなたのカルテ</h2>
    <canvas id="karteCanvas" width="800" height="1000"></canvas>
    <button class="btn-download" id="btnDownload" onclick="downloadKarte()">📥 画像をダウンロード</button>
  </div>
</div>

<script>
  // ===== State =====
  let selectedFont = "'Yomogi', cursive";
  let iconImage = null;

  // ===== Icon Preview =====
  document.getElementById('iconInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        iconImage = img;
        const preview = document.getElementById('iconPreview');
        preview.innerHTML = '';
        const imgEl = document.createElement('img');
        imgEl.src = ev.target.result;
        preview.appendChild(imgEl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ===== Font Selection =====
  function selectFont(el) {
    document.querySelectorAll('.font-option').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
    selectedFont = el.getAttribute('data-font');
  }

  // ===== Draw Helpers =====
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawHeart(ctx, x, y, size, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    const topCurveHeight = size * 0.3;
    ctx.moveTo(x, y + topCurveHeight);
    // left curve
    ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
    ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 2, x, y + size);
    // right curve
    ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 2, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
    ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const chars = text.split('');
    let line = '';
    let currentY = y;
    for (let i = 0; i < chars.length; i++) {
      const testLine = line + chars[i];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && line.length > 0) {
        ctx.fillText(line, x, currentY);
        line = chars[i];
        currentY += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, x, currentY);
    return currentY;
  }

  // ===== GENERATE =====
  function generateKarte() {
    const canvas = document.getElementById('karteCanvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 1000;
    canvas.width = W;
    canvas.height = H;

    // === Background - diagonal stripes ===
    ctx.fillStyle = '#e8f2fb';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.strokeStyle = 'rgba(180, 210, 240, 0.4)';
    ctx.lineWidth = 8;
    for (let i = -H; i < W + H; i += 24) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i + H, H);
      ctx.stroke();
    }
    ctx.restore();

    // === White card ===
    const cardX = 30, cardY = 80, cardW = W - 60, cardH = H - 110;
    ctx.save();
    ctx.shadowColor = 'rgba(91,143,201,0.12)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 4;
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, cardX, cardY, cardW, cardH, 24);
    ctx.fill();
    ctx.restore();

    // === Header ===
    ctx.fillStyle = '#5b8fc9';
    ctx.font = "500 14px 'Zen Maru Gothic', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('L O V E   C L I N I C', W / 2, 48);
    ctx.font = "900 32px 'Zen Maru Gothic', sans-serif";
    ctx.fillText('恋愛', W / 2 - 30, 78);
    ctx.fillStyle = '#e891b9';
    ctx.fillText('♡', W / 2, 78);
    ctx.fillStyle = '#5b8fc9';
    ctx.fillText('病院', W / 2 + 30, 78);

    // === Corner hearts ===
    drawHeart(ctx, 56, 90, 20, 'rgba(180,210,240,0.5)');
    drawHeart(ctx, W - 56, 90, 20, 'rgba(180,210,240,0.5)');
    drawHeart(ctx, 56, H - 50, 18, 'rgba(232,145,185,0.35)');
    drawHeart(ctx, W - 56, H - 50, 18, 'rgba(232,145,185,0.35)');
    drawHeart(ctx, W - 80, 130, 14, 'rgba(180,210,240,0.35)');

    // === Icon ===
    const iconX = 56, iconY = 110, iconSize = 195;
    ctx.save();
    roundRect(ctx, iconX, iconY, iconSize, iconSize, 18);
    ctx.clip();
    if (iconImage) {
      ctx.drawImage(iconImage, iconX, iconY, iconSize, iconSize);
    } else {
      ctx.fillStyle = '#e8f4fd';
      ctx.fillRect(iconX, iconY, iconSize, iconSize);
      ctx.fillStyle = '#a0c4e8';
      ctx.font = "14px 'Zen Maru Gothic'";
      ctx.textAlign = 'center';
      ctx.fillText('No Image', iconX + iconSize / 2, iconY + iconSize / 2 + 5);
    }
    ctx.restore();

    // === Field drawing ===
    const labelColor = '#5b8fc9';
    const textColor = '#333';
    const lineColor = 'rgba(200,220,240,0.5)';

    function drawLabel(text, x, y) {
      ctx.fillStyle = labelColor;
      ctx.font = "500 13px 'Zen Maru Gothic', sans-serif";
      ctx.textAlign = 'left';
      ctx.fillText(text, x, y);
    }

    function drawValue(text, x, y, maxW, size) {
      ctx.fillStyle = textColor;
      const sz = size || 22;
      ctx.font = sz + "px " + selectedFont;
      ctx.textAlign = 'left';
      wrapText(ctx, text || '', x, y, maxW || 300, sz + 6);
    }

    function drawDivider(x1, x2, y) {
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Right column start
    const RX = 290;
    const RW = 210;
    const RX2 = 530;
    const RW2 = 210;

    // Row positions
    const r1 = 122;
    // お名前
    drawLabel('お名前', RX, r1);
    drawValue(document.getElementById('fname').value, RX, r1 + 28, 440, 30);
    drawDivider(RX, W - 50, r1 + 42);

    // 年齢・出身地
    const r2 = 180;
    drawLabel('年齢・出身地', RX, r2);
    const ageOrigin = (document.getElementById('fage').value || '') + '  ' + (document.getElementById('forigin').value || '');
    drawValue(ageOrigin, RX, r2 + 28, 440, 26);
    drawDivider(RX, W - 50, r2 + 42);

    // 職業
    const r3 = 235;
    drawLabel('職業', RX, r3);
    drawValue(document.getElementById('fjob').value, RX, r3 + 28, 440, 28);
    drawDivider(RX, W - 50, r3 + 42);

    // === Two column section ===
    const midX = W / 2;

    // ラブタイプ / ニックネーム
    const r4 = 330;
    drawDivider(cardX + 10, W - cardX - 10, r4 - 10);
    drawLabel('ラブタイプ', 56, r4);
    drawValue(document.getElementById('flovetype').value, 56, r4 + 30, 310, 26);

    ctx.strokeStyle = lineColor; ctx.lineWidth = 1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(midX, r4 - 10); ctx.lineTo(midX, r4 + 50); ctx.strokeStyle = lineColor; ctx.stroke();

    drawLabel('ニックネーム', midX + 20, r4);
    drawValue(document.getElementById('fnickname').value, midX + 20, r4 + 30, 310, 26);

    // 好きなアーティスト / 子供の頃の夢
    const r5 = 400;
    drawDivider(cardX + 10, W - cardX - 10, r5 - 10);
    drawLabel('好きなアーティスト', 56, r5);
    drawValue(document.getElementById('fartist').value, 56, r5 + 30, 310, 24);

    ctx.beginPath(); ctx.moveTo(midX, r5 - 10); ctx.lineTo(midX, r5 + 50); ctx.strokeStyle = lineColor; ctx.stroke();

    drawLabel('子供の頃の夢', midX + 20, r5);
    drawValue(document.getElementById('fdream').value, midX + 20, r5 + 30, 310, 24);

    // 趣味・特技 / 恋愛における自分の強み
    const r6 = 470;
    drawDivider(cardX + 10, W - cardX - 10, r6 - 10);
    drawLabel('趣味・特技', 56, r6);
    drawValue(document.getElementById('fhobby').value, 56, r6 + 30, 310, 22);

    ctx.beginPath(); ctx.moveTo(midX, r6 - 10); ctx.lineTo(midX, r6 + 55); ctx.strokeStyle = lineColor; ctx.stroke();

    drawLabel('恋愛における自分の強み', midX + 20, r6);
    drawValue(document.getElementById('fstrength').value, midX + 20, r6 + 30, 310, 22);

    // 過去の恋愛失敗談 / 恋愛偏差値
    const r7 = 550;
    drawDivider(cardX + 10, W - cardX - 10, r7 - 10);
    drawLabel('過去の恋愛失敗談', 56, r7);
    drawValue(document.getElementById('ffail').value, 56, r7 + 28, 310, 20);

    ctx.beginPath(); ctx.moveTo(midX, r7 - 10); ctx.lineTo(midX, r7 + 70); ctx.strokeStyle = lineColor; ctx.stroke();

    drawLabel('恋愛偏差値', midX + 20, r7);
    drawValue(document.getElementById('fdeviation').value, midX + 20, r7 + 35, 310, 36);

    // 番組内で自分のここをみて！ / OA直前の気持ちは？
    const r8 = 660;
    drawDivider(cardX + 10, W - cardX - 10, r8 - 10);
    drawLabel('番組内で自分のここをみて！', 56, r8);
    drawValue(document.getElementById('fwatch').value, 56, r8 + 30, 310, 24);

    ctx.beginPath(); ctx.moveTo(midX, r8 - 10); ctx.lineTo(midX, r8 + 70); ctx.strokeStyle = lineColor; ctx.stroke();

    drawLabel('OA直前の気持ちは？', midX + 20, r8);
    drawValue(document.getElementById('ffeeling').value, midX + 20, r8 + 30, 310, 22);

    // Show result
    document.getElementById('karteWrapper').style.display = 'block';
    document.getElementById('btnDownload').style.display = 'block';

    // Scroll to result
    setTimeout(() => {
      document.getElementById('karteWrapper').scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  // ===== Download =====
  function downloadKarte() {
    const canvas = document.getElementById('karteCanvas');
    const link = document.createElement('a');
    link.download = '恋愛病院カルテ.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋愛病院カルテメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700;900&family=Klee+One:wght@400;600&family=Yuji+Syuku&family=Zen+Kurenaido&family=Yomogi&family=Kaisei+Opti:wght@400;700&family=Reggae+One&family=Hachi+Maru+Pop&family=Zen+Antique+Soft&family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:linear-gradient(135deg,#e3f0fa,#eee8f5,#fbe4ec);min-height:100vh;padding:16px}
.wrap{max-width:640px;margin:0 auto}
.title{text-align:center;margin-bottom:22px}
.title small{color:#a3c8e2;font-size:.7rem;letter-spacing:3px;display:block;margin-bottom:2px}
.title h1{font-size:1.7rem;color:#6aa7d4}.title h1 b{color:#e88fb8;font-weight:900}
.desc{text-align:center;color:#b0b0b0;font-size:.78rem;margin-bottom:20px}
.card{background:#fff;border-radius:18px;padding:22px 24px;margin-bottom:16px;box-shadow:0 3px 14px rgba(90,140,200,.08)}
.card h2{color:#6aa7d4;font-size:1.05rem;margin-bottom:14px;padding-bottom:8px;border-bottom:2px dashed #d4e6f4}
.g{margin-bottom:13px}
.g label{display:block;font-weight:700;color:#6aa7d4;font-size:.82rem;margin-bottom:3px}
.g input,.g textarea{width:100%;padding:9px 12px;border:2px solid #d4e6f4;border-radius:10px;font-size:.92rem;font-family:inherit;background:#fafcff;transition:border .2s}
.g input:focus,.g textarea:focus{outline:none;border-color:#7bb8df;background:#fff}
.g textarea{height:50px;resize:vertical}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.iu{display:flex;align-items:center;gap:14px}
.ip{width:84px;height:84px;border-radius:12px;background:#eaf3fb;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2.5px dashed #a8ceea;flex-shrink:0;cursor:pointer}
.ip:hover{border-color:#6aa7d4}
.ip img{width:100%;height:100%;object-fit:cover}
.ip .ph{color:#9ec5e2;font-size:.65rem;text-align:center;line-height:1.3}
.fs{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:6px}
.fo{padding:8px 4px;border:2px solid #e0eaf3;border-radius:10px;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.fo:hover{border-color:#88bade;background:#f0f7ff}
.fo.on{border-color:#6aa7d4;background:#e3f1fb;box-shadow:0 0 0 2px rgba(106,167,212,.2)}
.fo .nm{font-size:.58rem;color:#aaa;margin-top:2px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#7cb8e6,#b3a5d8,#e88fb8);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:900;font-family:inherit;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 14px rgba(90,140,200,.25);transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(90,140,200,.32)}
.out{display:none;margin-top:22px;text-align:center}
.out h2{color:#6aa7d4;margin-bottom:10px;font-size:1rem}
.out p.hint{color:#aaa;font-size:.72rem;margin-top:8px}
#resultImg{max-width:100%;border-radius:10px;box-shadow:0 6px 24px rgba(90,140,200,.15)}
canvas{display:none}
@media(max-width:540px){.r2{grid-template-columns:1fr}.fs{grid-template-columns:repeat(2,1fr)}.title h1{font-size:1.35rem}.card{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
<div class="title"><small>L O V E  C L I N I C</small><h1>恋愛<b>♡</b>病院</h1></div>
<p class="desc">カルテメーカー ─ あなたの恋愛カルテを作ろう！</p>

<div class="card">
<h2>📷 アイコン設定</h2>
<div class="iu">
<div class="ip" id="iconP" onclick="document.getElementById('iconI').click()"><div class="ph">タップして<br>画像を選択</div></div>
<div><input type="file" id="iconI" accept="image/*"><p style="font-size:.65rem;color:#aaa;margin-top:3px">正方形推奨</p></div>
</div>
</div>

<div class="card">
<h2>📝 プロフィール</h2>
<div class="g"><label>お名前</label><input id="f_name" placeholder="桑田 能征"></div>
<div class="r2"><div class="g"><label>年齢</label><input id="f_age" placeholder="40歳"></div><div class="g"><label>出身地</label><input id="f_from" placeholder="大阪府"></div></div>
<div class="g"><label>職業</label><input id="f_job" placeholder="実業家"></div>
<div class="r2"><div class="g"><label>ラブタイプ</label><input id="f_love" placeholder="憧れの先輩"></div><div class="g"><label>ニックネーム</label><input id="f_nick" placeholder="りゅーびー"></div></div>
<div class="r2"><div class="g"><label>好きなアーティスト</label><input id="f_art" placeholder="Mrs. GREEN APPLE"></div><div class="g"><label>子供の頃の夢</label><input id="f_dream" placeholder="サッカー選手"></div></div>
<div class="r2"><div class="g"><label>趣味・特技</label><input id="f_hobby" placeholder="サッカー, スノボ, バイオリン"></div><div class="g"><label>恋愛における自分の強み</label><input id="f_str" placeholder="牽引力 ぐいぐい引っぱる！"></div></div>
<div class="r2"><div class="g"><label>過去の恋愛失敗談</label><textarea id="f_fail" placeholder="仕事を追うことに夢中になっておざなりにしてしまった"></textarea></div><div class="g"><label>恋愛偏差値</label><input id="f_dev" placeholder="40〜45"></div></div>
<div class="r2"><div class="g"><label>番組内で自分のここをみて！</label><textarea id="f_watch" placeholder="輪で楽しめるとこ。"></textarea></div><div class="g"><label>OA直前の気持ちは？</label><textarea id="f_feel" placeholder="誰が病人なんだ！！"></textarea></div></div>
</div>

<div class="card">
<h2>🖊 フォント選択</h2>
<div class="fs">
<div class="fo on" data-f="Yomogi" onclick="sf(this)"><span style="font-family:Yomogi;font-size:1rem">あいう恋愛</span><div class="nm">Yomogi</div></div>
<div class="fo" data-f="Klee One" onclick="sf(this)"><span style="font-family:'Klee One';font-size:1rem">あいう恋愛</span><div class="nm">Klee One</div></div>
<div class="fo" data-f="Zen Kurenaido" onclick="sf(this)"><span style="font-family:'Zen Kurenaido';font-size:1rem">あいう恋愛</span><div class="nm">Zen Kurenaido</div></div>
<div class="fo" data-f="Yuji Syuku" onclick="sf(this)"><span style="font-family:'Yuji Syuku';font-size:1rem">あいう恋愛</span><div class="nm">Yuji Syuku</div></div>
<div class="fo" data-f="Hachi Maru Pop" onclick="sf(this)"><span style="font-family:'Hachi Maru Pop';font-size:1rem">あいう恋愛</span><div class="nm">Hachi Maru Pop</div></div>
<div class="fo" data-f="Zen Antique Soft" onclick="sf(this)"><span style="font-family:'Zen Antique Soft';font-size:1rem">あいう恋愛</span><div class="nm">Zen Antique Soft</div></div>
<div class="fo" data-f="Zen Maru Gothic" onclick="sf(this)"><span style="font-family:'Zen Maru Gothic';font-weight:700;font-size:1rem">あいう恋愛</span><div class="nm">丸ゴシック</div></div>
<div class="fo" data-f="M PLUS Rounded 1c" onclick="sf(this)"><span style="font-family:'M PLUS Rounded 1c';font-weight:700;font-size:1rem">あいう恋愛</span><div class="nm">M+Rounded</div></div>
</div>
</div>

<button class="btn" onclick="gen()">♡ カルテを生成する ♡</button>

<div class="out" id="out">
<h2>完成したカルテ</h2>
<img id="resultImg" src="" alt="恋愛病院カルテ">
<p class="hint">📱 長押し →「写真に追加」で保存できます</p>
</div>
<canvas id="cv"></canvas>
</div>

<script>
let font='Yomogi', icon=null;

document.getElementById('iconI').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{const i=new Image();i.onload=()=>{icon=i;const p=document.getElementById('iconP');p.innerHTML='';const m=document.createElement('img');m.src=ev.target.result;p.appendChild(m)};i.src=ev.target.result};
  r.readAsDataURL(f);
});
function sf(el){document.querySelectorAll('.fo').forEach(o=>o.classList.remove('on'));el.classList.add('on');font=el.getAttribute('data-f')}
function V(id){return document.getElementById(id).value||''}

function gen(){
  const c=document.getElementById('cv'),g=c.getContext('2d');
  const W=960,H=1280,S=2;
  c.width=W*S;c.height=H*S;
  g.scale(S,S);

  // ===== BG =====
  g.fillStyle='#d8ebf6';
  g.fillRect(0,0,W,H);
  for(let i=-H*2;i<W+H*2;i+=16){
    g.strokeStyle='rgba(218,237,250,0.9)';g.lineWidth=9;
    g.beginPath();g.moveTo(i,0);g.lineTo(i+H*1.1,H);g.stroke();
  }

  // ===== WHITE CARD =====
  const cardM=34;
  const cardX=cardM,cardY=92,cardW=W-cardM*2,cardH=H-cardY-cardM;
  g.save();
  g.shadowColor='rgba(120,170,210,0.06)';g.shadowBlur=14;g.shadowOffsetY=2;
  g.fillStyle='#ffffff';rr(g,cardX,cardY,cardW,cardH,24);g.fill();
  g.restore();

  // ===== HEADER =====
  g.textAlign='center';g.textBaseline='alphabetic';
  g.fillStyle='#aecfdf';g.font="400 13px 'Zen Maru Gothic'";
  g.fillText('L O V E   C L I N I C',W/2,34);
  g.font="900 42px 'Zen Maru Gothic'";
  const hy=78;g.textAlign='left';
  const w1=g.measureText('恋愛').width,wh=g.measureText('♡').width,w2=g.measureText('病院').width;
  const sp=10,tot=w1+wh+w2+sp*2,hsx=(W-tot)/2;
  g.fillStyle='#6aa7d4';g.fillText('恋愛',hsx,hy);
  g.fillStyle='#e88fb8';g.fillText('♡',hsx+w1+sp,hy);
  g.fillStyle='#6aa7d4';g.fillText('病院',hsx+w1+wh+sp*2,hy);

  // ===== HEARTS =====
  heartO(g,cardX+4,cardY-6,30,'rgba(155,205,240,0.45)',2);
  heartF(g,W-cardX-8,cardY-8,26,'rgba(155,205,240,0.35)');
  heartF(g,W-cardX-42,cardY+8,15,'rgba(155,205,240,0.22)');
  heartF(g,cardX+10,H-cardM+6,15,'rgba(185,165,215,0.3)');
  heartO(g,W-cardX-12,H-cardM+4,24,'rgba(155,205,240,0.35)',1.5);

  // ===== INNER LAYOUT =====
  const pad=48;
  const L=cardX+pad,R=cardX+cardW-pad,FW=R-L;
  const MID=L+FW/2;
  const CL=L,CR=MID+16;
  const CLW=MID-CL-16,CRW=R-CR;

  const lc='#6aaad0';  // label color
  const vc='#1a1a1a';  // value color
  const dc='rgba(175,210,230,0.50)'; // line color

  // ===== ICON + RIGHT 3 ROWS =====
  // Key: icon height = total height of 3 rows
  const iconX=L,iconY=cardY+pad;
  const rowH3=90; // each of the 3 right rows
  const iconSize=rowH3*3; // icon = 3 rows height = 270
  const iconW=iconSize,iconH=iconSize;

  // Draw icon
  g.save();rr(g,iconX,iconY,iconW,iconH,16);g.clip();
  if(icon){
    const sc=Math.max(iconW/icon.width,iconH/icon.height);
    const sw=icon.width*sc,sh=icon.height*sc;
    g.drawImage(icon,iconX-(sw-iconW)/2,iconY-(sh-iconH)/2,sw,sh);
  }else{
    g.fillStyle='#edf4fb';g.fillRect(iconX,iconY,iconW,iconH);
    g.fillStyle='#a0c2da';g.font="500 15px 'Zen Maru Gothic'";
    g.textAlign='center';g.fillText('No Image',iconX+iconW/2,iconY+iconH/2+5);
  }
  g.restore();

  // Right column start
  const rx=iconX+iconW+32,rw=R-rx;
  g.textAlign='left';

  function lab(t,lx,ly){
    g.fillStyle=lc;
    g.font="700 18px 'Zen Maru Gothic'";
    g.textAlign='left';
    g.fillText(t,lx,ly);
  }
  function ans(t,ax,ay,mw,sz){
    if(!t)return ay;
    g.fillStyle=vc;
    g.font="600 "+(sz||28)+"px '"+font+"','Zen Maru Gothic',sans-serif";
    g.textAlign='left';
    return wt(g,t,ax,ay,mw,(sz||28)+8);
  }
  function hln(x1,x2,y){
    g.strokeStyle=dc;g.lineWidth=1.2;g.setLineDash([]);
    g.beginPath();g.moveTo(x1,y);g.lineTo(x2,y);g.stroke();
  }

  // Row 1: お名前
  let ry0=iconY;
  lab('お名前',rx,ry0+22);
  ans(V('f_name'),rx,ry0+58,rw,38);
  hln(rx,R,ry0+rowH3);

  // Row 2: 年齢・出身
  let ry1=iconY+rowH3;
  lab('年齢・出身',rx,ry1+22);
  ans(V('f_age')+'　'+V('f_from'),rx,ry1+58,rw,32);
  hln(rx,R,ry1+rowH3);

  // Row 3: 職業
  let ry2=iconY+rowH3*2;
  lab('職業',rx,ry2+22);
  ans(V('f_job'),rx,ry2+58,rw,34);

  // ===== SECTION DIVIDER (full width, under icon area) =====
  const secDivY=iconY+iconH+24;
  hln(L,R,secDivY);

  // ===== TWO-COLUMN ROWS (no vertical lines, only horizontal) =====
  const twoRowH=104;
  const bigRowH=118; // for rows with larger text or more content

  const rows=[
    {ll:'ラブタイプ',            rl:'ニックネーム',           ls:30,rs:30,h:twoRowH},
    {ll:'好きなアーティスト',      rl:'子供の頃の夢',          ls:26,rs:28,h:twoRowH},
    {ll:'趣味・特技',             rl:'恋愛における自分の強み',  ls:24,rs:24,h:twoRowH},
    {ll:'過去の恋愛失敗談',       rl:'恋愛偏差値',            ls:20,rs:42,h:bigRowH},
    {ll:'番組内で自分のここをみて！',rl:'OA直前の気持ちは？',   ls:26,rs:24,h:bigRowH},
  ];
  const vls=[
    [()=>V('f_love'),()=>V('f_nick')],
    [()=>V('f_art'),()=>V('f_dream')],
    [()=>V('f_hobby'),()=>V('f_str')],
    [()=>V('f_fail'),()=>V('f_dev')],
    [()=>V('f_watch'),()=>V('f_feel')],
  ];

  let ry=secDivY;
  rows.forEach((row,i)=>{
    const labY=ry+28;
    const valY=ry+60;

    // Left
    lab(row.ll,CL,labY);
    ans(vls[i][0](),CL,valY,CLW,row.ls);

    // Right
    lab(row.rl,CR,labY);
    ans(vls[i][1](),CR,valY,CRW,row.rs);

    ry+=row.h;
    hln(L,R,ry);
  });

  // Bottom area below last line = generous whitespace until card bottom
  // (card bottom is at cardY+cardH, last line is at ry)
  // The remaining space is the "bottom margin" — we sized H to ensure this is large

  // ===== OUTPUT =====
  document.getElementById('resultImg').src=c.toDataURL('image/png');
  document.getElementById('out').style.display='block';
  setTimeout(()=>document.getElementById('out').scrollIntoView({behavior:'smooth'}),80);
}

// ===== UTILS =====
function rr(g,a,b,w,h,r){
  g.beginPath();g.moveTo(a+r,b);g.lineTo(a+w-r,b);g.quadraticCurveTo(a+w,b,a+w,b+r);
  g.lineTo(a+w,b+h-r);g.quadraticCurveTo(a+w,b+h,a+w-r,b+h);g.lineTo(a+r,b+h);
  g.quadraticCurveTo(a,b+h,a,b+h-r);g.lineTo(a,b+r);g.quadraticCurveTo(a,b,a+r,b);g.closePath();
}
function hp(g,cx,cy,s){
  g.beginPath();g.moveTo(cx,cy+s*.3);
  g.bezierCurveTo(cx,cy,cx-s*.5,cy,cx-s*.5,cy+s*.3);
  g.bezierCurveTo(cx-s*.5,cy+s*.7,cx,cy+s*.85,cx,cy+s);
  g.bezierCurveTo(cx,cy+s*.85,cx+s*.5,cy+s*.7,cx+s*.5,cy+s*.3);
  g.bezierCurveTo(cx+s*.5,cy,cx,cy,cx,cy+s*.3);g.closePath();
}
function heartF(g,cx,cy,s,c){g.save();g.fillStyle=c;hp(g,cx,cy,s);g.fill();g.restore()}
function heartO(g,cx,cy,s,c,lw){g.save();g.strokeStyle=c;g.lineWidth=lw;hp(g,cx,cy,s);g.stroke();g.restore()}
function wt(g,t,x,y,mw,lh){
  let ln='',cy2=y;
  for(let i=0;i<t.length;i++){
    if(t[i]==='\n'){g.fillText(ln,x,cy2);ln='';cy2+=lh;continue}
    const tl=ln+t[i];
    if(g.measureText(tl).width>mw&&ln.length>0){g.fillText(ln,x,cy2);ln=t[i];cy2+=lh}
    else ln=tl;
  }
  if(ln)g.fillText(ln,x,cy2);
  return cy2;
}
</script>
</body>
</html>
